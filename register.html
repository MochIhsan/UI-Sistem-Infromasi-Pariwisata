<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register User</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{
      margin:0;
      font-family:"Poppins", sans-serif;
      background:#f4f7fb;
    }

    .register-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .register-box{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      padding:30px;
      box-shadow:0 20px 40px rgba(0,0,0,.12);
    }

    .register-box h2{
      margin:0 0 8px;
      text-align:center;
      color:#0f3a78;
    }

    .register-subtitle{
      text-align:center;
      font-size:14px;
      color:#6b7280;
      margin-bottom:22px;
    }

    .register-group{
      margin-bottom:16px;
    }

    .register-group label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin-bottom:6px;
      color:#111827;
    }

    .register-group input{
      width:100%;
      padding:12px 14px;
      border:1px solid #dbe3ef;
      border-radius:10px;
      font-size:14px;
      outline:none;
      box-sizing:border-box;
    }

    .register-group input:focus{
      border-color:#0f3a78;
    }

    .register-submit{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#0f3a78;
      color:#fff;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      margin-top:8px;
    }

    .register-submit:hover{
      background:#0b2f61;
    }

    .register-message{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:#16a34a;
    }

    .register-login{
      margin-top:16px;
      text-align:center;
      font-size:14px;
      color:#6b7280;
    }

    .register-login a{
      color:#0f3a78;
      font-weight:700;
      text-decoration:none;
    }

    .register-login a:hover{
      text-decoration:underline;
    }
    .register-password-wrap{
  position:relative;
  width:100%;
}

.register-password-wrap input{
  padding-right:48px;
}

.register-password-toggle{
  position:absolute;
  top:50%;
  right:12px;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  border:none;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:#6b7280;
  padding:0;
}

.register-password-toggle:hover{
  color:#0f3a78;
}

.register-password-toggle svg{
  width:21px;
  height:21px;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
  </style>
</head>
<body>
  <div class="register-page">
    <div class="register-box">
      <h2>Register User</h2>
      <p class="register-subtitle">Silakan buat akun untuk memberikan ulasan</p>

      <form id="registerForm">
        <div class="register-group">
          <label>Username</label>
          <input type="text" id="registerUsername" placeholder="Masukkan username" required>
        </div>

        <div class="register-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="Masukkan email" required>
        </div>

        <div class="register-group">
  <label>Password</label>

  <div class="register-password-wrap">
    <input
      type="password"
      id="registerPassword"
      placeholder="Masukkan password"
      required
    >

    <button
      type="button"
      class="register-password-toggle"
      id="toggleRegisterPassword"
      aria-label="Lihat password"
    >
      <!-- ikon mata tertutup default -->
      <svg id="eyeIcon" viewBox="0 0 24 24">
        <path d="M3 3l18 18"></path>
        <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
        <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c5 0 9.27 3.11 11 7.5a11.8 11.8 0 0 1-2.17 3.31"></path>
        <path d="M6.61 6.61A11.84 11.84 0 0 0 1 11.5C2.73 15.89 7 19 12 19a10.9 10.9 0 0 0 5.39-1.39"></path>
      </svg>
    </button>
  </div>
</div>

        <button type="submit" class="register-submit">Daftar</button>
      </form>

      <p class="register-message" id="registerMessage"></p>

      <p class="register-login">
        Sudah punya akun?
        <a href="index.html">Login</a>
      </p>
    </div>
  </div>

 <script>
  const registerForm = document.getElementById("registerForm");
  const registerMessage = document.getElementById("registerMessage");

  const registerPassword = document.getElementById("registerPassword");
  const toggleRegisterPassword = document.getElementById("toggleRegisterPassword");
  const eyeIcon = document.getElementById("eyeIcon");

  toggleRegisterPassword.addEventListener("click", function(){
    const isPassword = registerPassword.type === "password";

    registerPassword.type = isPassword ? "text" : "password";

    if(isPassword){
      eyeIcon.innerHTML = `
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      `;
      toggleRegisterPassword.setAttribute("aria-label", "Tutup password");
    } else {
      eyeIcon.innerHTML = `
        <path d="M3 3l18 18"></path>
        <path d="M10.58 10.58A2 2 0 0 0 13.42 13.42"></path>
        <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c5 0 9.27 3.11 11 7.5a11.8 11.8 0 0 1-2.17 3.31"></path>
        <path d="M6.61 6.61A11.84 11.84 0 0 0 1 11.5C2.73 15.89 7 19 12 19a10.9 10.9 0 0 0 5.39-1.39"></path>
      `;
      toggleRegisterPassword.setAttribute("aria-label", "Lihat password");
    }
  });

  registerForm.addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("registerUsername").value.trim();
    const email = document.getElementById("registerEmail").value.trim();
    const password = document.getElementById("registerPassword").value.trim();

    if(username === "" || email === "" || password === ""){
      registerMessage.style.color = "red";
      registerMessage.textContent = "Semua field wajib diisi.";
      return;
    }

    if(!email.includes("@")){
      alert("Email tidak valid! Harus mengandung '@'");
      return;
    }

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){
      alert("Format email tidak valid!");
      return;
    }

    localStorage.setItem("registeredUser", username);
    localStorage.setItem("registeredEmail", email);
    localStorage.setItem("registeredPass", password);

    registerMessage.style.color = "green";
    registerMessage.textContent = "Pendaftaran berhasil! Silakan login.";

    registerForm.reset();

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);
  });
</script>
</script>
</body>
</html>
