<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register User</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body{
      margin:0;
      font-family:"Poppins", sans-serif;
      background:#f4f7fb;
    }

    .register-page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .register-box{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:18px;
      padding:30px;
      box-shadow:0 20px 40px rgba(0,0,0,.12);
    }

    .register-box h2{
      margin:0 0 8px;
      text-align:center;
      color:#0f3a78;
    }

    .register-subtitle{
      text-align:center;
      font-size:14px;
      color:#6b7280;
      margin-bottom:22px;
    }

    .register-group{
      margin-bottom:16px;
    }

    .register-group label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin-bottom:6px;
      color:#111827;
    }

    .register-group input{
      width:100%;
      padding:12px 14px;
      border:1px solid #dbe3ef;
      border-radius:10px;
      font-size:14px;
      outline:none;
      box-sizing:border-box;
    }

    .register-group input:focus{
      border-color:#0f3a78;
    }

    .register-submit{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#0f3a78;
      color:#fff;
      font-weight:700;
      font-size:14px;
      cursor:pointer;
      margin-top:8px;
    }

    .register-submit:hover{
      background:#0b2f61;
    }

    .register-message{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:#16a34a;
    }

    .register-login{
      margin-top:16px;
      text-align:center;
      font-size:14px;
      color:#6b7280;
    }

    .register-login a{
      color:#0f3a78;
      font-weight:700;
      text-decoration:none;
    }

    .register-login a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="register-page">
    <div class="register-box">
      <h2>Register User</h2>
      <p class="register-subtitle">Silakan buat akun untuk memberikan ulasan</p>

      <form id="registerForm">
        <div class="register-group">
          <label>Username</label>
          <input type="text" id="registerUsername" placeholder="Masukkan username" required>
        </div>

        <div class="register-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="Masukkan email" required>
        </div>

        <div class="register-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="register-submit">Daftar</button>
      </form>

      <p class="register-message" id="registerMessage"></p>

      <p class="register-login">
        Sudah punya akun?
        <a href="index.html">Login</a>
      </p>
    </div>
  </div>

 <script>
  const registerForm = document.getElementById("registerForm");
  const registerMessage = document.getElementById("registerMessage");

  registerForm.addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.getElementById("registerUsername").value.trim();
    const email = document.getElementById("registerEmail").value.trim();
    const password = document.getElementById("registerPassword").value.trim();

    // validasi kosong
    if(username === "" || email === "" || password === ""){
      registerMessage.style.color = "red";
      registerMessage.textContent = "Semua field wajib diisi.";
      return;
    }

    // ✅ VALIDASI EMAIL HARUS ADA "@"
    if(!email.includes("@")){
      alert("Email tidak valid! Harus mengandung '@'");
      return;
    }

    // (opsional tambahan lebih ketat)
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){
      alert("Format email tidak valid!");
      return;
    }

    // simpan akun user ke localStorage
    localStorage.setItem("registeredUser", username);
    localStorage.setItem("registeredEmail", email);
    localStorage.setItem("registeredPass", password);

    registerMessage.style.color = "green";
    registerMessage.textContent = "Pendaftaran berhasil! Silakan login.";

    registerForm.reset();

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1500);
  });
</script>
</body>
</html>
